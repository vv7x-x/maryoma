<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" name="viewport"/>
    <title>Mariam's World ✦</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌹</text></svg>">
    <meta name="theme-color" content="#2a0416">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Aref+Ruqaa:wght@400;700&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg: linear-gradient(180deg,#16030a,#2a0416);
            --surface: rgba(255,255,255,0.03);
            --text: #fff;
            --muted: rgba(255,220,230,0.9);
            --gold: #ec4899; /* accent */
            --gold-light: #fdf2f8;
            --gold-dim: rgba(236, 72, 153, 0.28);
            --crimson: #be185d;
            --rose-deep: #831843;
            --glass: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(236, 72, 153, 0.22);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            font-family: 'Cormorant Garamond', serif;
            min-height: 100vh;
            min-height: 100dvh;
            width: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--text);
            /* Safe area padding */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            -webkit-overflow-scrolling: touch;
        }

        /* Canvas Background */
        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* Aurora layers */
        .aurora {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }
        .aurora-layer {
            position: absolute;
            border-radius: 50%;
            /* filter and mix-blend-mode removed for mobile performance */
            animation: drift 15s ease-in-out infinite alternate;
            will-change: transform;
        }
        .aurora-1 {
            width: 70vw; height: 60vh;
            background: radial-gradient(ellipse, rgba(190, 24, 93, 0.4) 0%, transparent 70%);
            top: -10%; left: -10%;
            animation-duration: 18s;
        }
        .aurora-2 {
            width: 60vw; height: 70vh;
            background: radial-gradient(ellipse, rgba(236, 72, 153, 0.4) 0%, transparent 70%);
            bottom: -10%; right: -10%;
            animation-duration: 22s;
            animation-delay: -8s;
        }
        .aurora-3 {
            width: 50vw; height: 50vh;
            background: radial-gradient(ellipse, rgba(244, 114, 182, 0.3) 0%, transparent 70%);
            top: 30%; left: 30%;
            animation-duration: 14s;
            animation-delay: -4s;
        }
        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5vw, 5vh) scale(1.15); }
        }


        /* Main Content */
        main {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            margin: auto; /* Fix for flex centering overflow */
            gap: 0;
            opacity: 0;
            animation: pageReveal 2s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
            width: 100%;
            max-width: 1100px;
        }
        @keyframes pageReveal {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Portrait */
        .portrait-wrap {
            --p-scale: 1;
            position: relative;
            width: calc(480px * var(--p-scale)); 
            height: calc(480px * var(--p-scale));
            margin: 0 auto 3rem auto;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            perspective: 1000px;
        }
        @media (max-width: 1024px) { .portrait-wrap { --p-scale: 0.85; margin-bottom: 2rem; } }
        @media (max-width: 768px) { .portrait-wrap { --p-scale: 0.7; margin-bottom: 1rem; } }
        @media (max-width: 480px) { .portrait-wrap { --p-scale: 0.5; margin-bottom: 0rem; } }
        @media (max-width: 380px) { .portrait-wrap { --p-scale: 0.42; margin-bottom: 0rem; } }
        @media (max-height: 800px) { .portrait-wrap { --p-scale: 0.75; margin-bottom: 1rem; } }
        @media (max-height: 650px) { .portrait-wrap { --p-scale: 0.5; margin-bottom: 0; } }
        /* Landscape Mobile */
        @media (max-height: 500px) and (orientation: landscape) { 
            .portrait-wrap { --p-scale: 0.35; margin-bottom: 0; } 
            h1 { font-size: 2rem !important; }
            .cta-btn { padding: 0.6rem 1.5rem; font-size: 1rem; margin-bottom: 2rem; }
        }
        
        .portrait-inner {
            position: absolute;
            width: 480px; height: 480px;
            display: flex; align-items: center; justify-content: center;
            transform: scale(var(--p-scale));
            border-radius: 50%;
            will-change: transform;
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }

        /* Multiple spinning rings */
        .ring {
            position: absolute;
            top: 50%; left: 50%;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            opacity: 0;
            will-change: transform;
            animation: pageReveal 2s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
        }
        .ring-1 {
            width: 320px; height: 320px;
            border: 1px solid var(--gold-dim);
            animation: spinRing 30s linear infinite;
            box-shadow: 0 0 30px var(--gold-dim), inset 0 0 30px var(--gold-dim);
        }
        .ring-2 {
            width: 360px; height: 360px;
            border: 1px dashed rgba(212, 168, 81, 0.15);
            animation: spinRing 45s linear infinite reverse;
        }
        .ring-3 {
            width: 290px; height: 290px;
            border: 0.5px solid rgba(255, 200, 210, 0.2);
            animation: spinRing 20s linear infinite;
        }
        @keyframes spinRing {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Orbital gems on ring-1 */
        .gem {
            position: absolute;
            top: 50%; left: 50%;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--gold);
            box-shadow: 0 0 12px var(--gold), 0 0 24px rgba(212,168,81,0.6);
            transform-origin: 0 0;
            animation: orbitGem var(--orbit-dur, 30s) linear infinite var(--orbit-delay, 0s);
        }
        @keyframes orbitGem {
            from { transform: rotate(var(--start, 0deg)) translateX(159px) rotate(calc(-1 * var(--start, 0deg))); }
            to { transform: rotate(calc(var(--start, 0deg) + 360deg)) translateX(159px) rotate(calc(-1 * (var(--start, 0deg) + 360deg))); }
        }

        /* Portrait glow halo */
        .portrait-halo {
            position: absolute;
            top: 50%; left: 50%;
            width: 260px; height: 260px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212,168,81,0.15) 0%, transparent 70%);
            animation: haloPulse 4s ease-in-out infinite alternate;
            pointer-events: none;
        }
        @keyframes haloPulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
        }

        /* Epic Camera Shake */
        @keyframes cameraShake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-2px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .portrait-frame {
            position: relative;
            z-index: 5;
            width: 240px; height: 240px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--gold);
            box-shadow: 
                0 0 0 4px rgba(212,168,81,0.15),
                0 10px 40px rgba(0,0,0,0.5),
                inset 0 0 20px rgba(0,0,0,0.3);
        }
        .portrait-frame img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 2s ease;
        }
        .portrait-frame:hover img { transform: scale(1.05); }

        /* Portrait gems */
        .p-gem {
            position: absolute;
            z-index: 6;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(13, 0, 5, 0.7);
            border: 1px solid var(--gold);
            box-shadow: 0 0 20px rgba(212,168,81,0.4);
            backdrop-filter: blur(10px);
        }
        .p-gem-1 {
            width: 52px; height: 52px;
            bottom: 10px; right: -10px;
            animation: gemFloat 4s ease-in-out infinite;
        }
        .p-gem-2 {
            width: 40px; height: 40px;
            top: 5px; left: -15px;
            animation: gemFloat 5s ease-in-out infinite reverse;
        }
        @keyframes gemFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .p-gem .material-symbols-outlined {
            font-size: 22px;
            color: var(--gold-light);
            font-variation-settings: 'FILL' 1;
        }
        .p-gem-1 .material-symbols-outlined { font-size: 26px; }

        /* Headline */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 6vw, 5.5rem);
            font-weight: 400;
            font-style: italic;
            color: var(--text);
            line-height: 1.15;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
            text-shadow: 0 0 60px rgba(212,168,81,0.3), 0 4px 30px rgba(0,0,0,0.5);
            position: relative;
        }
        h1 .name {
            display: block;
            background: linear-gradient(135deg, var(--gold-light), var(--gold), #c8985a, var(--gold-light));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmerText 4s linear infinite;
            font-style: normal;
            font-weight: 700;
        }
        @keyframes shimmerText {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        /* Gold divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1rem 0;
            opacity: 0.7;
        }
        .divider-line {
            height: 1px;
            width: 80px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }
        .divider-gem {
            width: 6px; height: 6px;
            background: var(--gold);
            transform: rotate(45deg);
            box-shadow: 0 0 10px var(--gold);
        }

        /* Subtitle */
        .subtitle {
            font-family: 'Amiri', serif;
            font-size: 1.4rem;
            color: var(--muted);
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 20px rgba(0,0,0,0.4);
            direction: rtl;
        }
        .subtitle-en {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.45);
            letter-spacing: 0.15em;
            margin-bottom: 2rem;
        }

        /* CTA Button */
        .cta-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 2.5rem;
            border-radius: 100px;
            text-decoration: none;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            letter-spacing: 0.12em;
            color: var(--text);
            font-weight: 600;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
            /* Focus styles for accessibility */
            a:focus, button:focus, .cta-btn:focus, .header-btn:focus {
                outline: 3px solid rgba(236,72,153,0.22);
                outline-offset: 4px;
                border-radius: 8px;
            }
        .cta-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--gold-light), var(--gold), #c8985a);
            background-size: 200% auto;
            animation: shimmerText 3s linear infinite;
        }
        .cta-btn::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 100px;
            background: linear-gradient(135deg, var(--gold-light), transparent, var(--gold));
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .cta-btn:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 20px 60px rgba(212,168,81,0.5); }
        .cta-btn:hover::after { opacity: 1; }
        .cta-btn span, .cta-btn .material-symbols-outlined { position: relative; z-index: 1; }
        .cta-btn .material-symbols-outlined {
            font-size: 1.4rem;
            transition: transform 0.3s;
            font-variation-settings: 'FILL' 1;
        }
        .cta-btn:hover .material-symbols-outlined { transform: rotate(20deg) scale(1.2); }

        /* Arabic calligraphic ornament */
        .ornament {
            font-family: 'Aref Ruqaa', serif;
            font-size: 2rem;
            color: var(--gold-dim);
            letter-spacing: 0.5em;
            margin-bottom: 0.5rem;
            animation: fadeOrnament 3s ease-in-out infinite alternate;
        }
        @keyframes fadeOrnament {
            0% { opacity: 0.3; }
            100% { opacity: 0.7; }
        }

        /* Falling petals canvas */
        #petals-canvas {
            position: fixed;
            inset: 0;
            z-index: 3;
            pointer-events: none;
        }

        .glare {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(125deg, rgba(255,255,255,0.4) 0%, transparent 40%, rgba(255,255,255,0.1) 100%);
            border-radius: 50%;
            z-index: 5;
            pointer-events: none;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .ring-1 { width: 260px; height: 260px; }
            .ring-2 { width: 300px; height: 300px; }
            .ring-3 { width: 234px; height: 234px; }
            .portrait-frame { width: 190px; height: 190px; }
        }
            /* Responsive helpers */
            img, video { max-width: 100%; height: auto; display: block; }
            @media (max-width: 800px) {
                body { align-items: center; padding-top: 0; }
                main { padding: 1.5rem 1rem; }
                .portrait-frame { width: 160px; height: 160px; }
                .ring-1, .ring-2, .ring-3 { display: none; }
                .aurora-layer { opacity: 0.6; }
                canvas#petals, #bg-canvas { display: none; }
            }
            @media (prefers-reduced-motion: reduce) {
                .ring, .aurora-layer, .portrait-halo, .gem { animation: none !important; transition: none !important; }
            }
    </style>
</head>
<body>
    <div id="page-transition-overlay" style="position:fixed; inset:0; background:#2a0416; z-index:99999; pointer-events:none; transition: opacity 1s cubic-bezier(0.2, 0.8, 0.2, 1);"></div>

    <canvas id="bg-canvas"></canvas>
    <div class="aurora">
        <div class="aurora-layer aurora-1"></div>
        <div class="aurora-layer aurora-2"></div>
        <div class="aurora-layer aurora-3"></div>
    </div>
    <canvas id="petals-canvas"></canvas>

    <main>
        <!-- Portrait -->
        <div class="portrait-wrap">
            <div class="portrait-inner">
                <div class="portrait-halo"></div>
                <div class="ring ring-1">
                    <div class="gem" style="--start:0deg; --orbit-dur:30s;"></div>
                    <div class="gem" style="--start:90deg; --orbit-dur:30s;"></div>
                    <div class="gem" style="--start:180deg; --orbit-dur:30s;"></div>
                    <div class="gem" style="--start:270deg; --orbit-dur:30s;"></div>
                </div>
                <div class="ring ring-2"></div>
                <div class="ring ring-3"></div>

                <div class="portrait-frame">
                    <img src="mariam3.jpg" alt="صورة مريم" decoding="async" loading="eager" onerror="this.style.background='linear-gradient(135deg,#8b0a2a,#d4a851)'; this.style.opacity='0.5'"/>
                    <div class="glare"></div>
                </div>

                <div class="p-gem p-gem-1">
                    <span class="material-symbols-outlined">favorite</span>
                </div>
                <div class="p-gem p-gem-2">
                    <span class="material-symbols-outlined" style="font-size:18px; color:var(--gold-light);">auto_awesome</span>
                </div>
            </div>
        </div>

        <!-- Text -->
        <div class="ornament">✦ ✦ ✦</div>

        <h1>
            Welcome back,
            <span class="name">Mariam</span>
        </h1>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-gem"></div>
            <div class="divider-line"></div>
        </div>

        <p class="subtitle">عالمكِ الجميل يشتاق إليكِ دومًا 🌹</p>
        <p class="subtitle-en">Your magical world awaits</p>

        <a href="gallery.html" class="cta-btn">
            <span>Enter My World</span>
            <span class="material-symbols-outlined">auto_awesome</span>
        </a>
    </main>

    <script>
        // Star field canvas
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        let stars = [];
        let lastWidth = window.innerWidth;
        function resizeBg() {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
            if(window.innerWidth !== lastWidth || stars.length === 0) {
                lastWidth = window.innerWidth;
                stars = Array.from({length: 90}, () => ({
                    x: Math.random() * bgCanvas.width,
                    y: Math.random() * bgCanvas.height,
                    r: Math.random() * 1.5 + 0.5,
                    o: Math.random() * 0.6 + 0.1,
                    speed: Math.random() * 0.3 + 0.05,
                    gold: Math.random() > 0.6,
                    twinkle: Math.random() * Math.PI * 2
                }));
            }
        }
        resizeBg();
        window.addEventListener('resize', resizeBg);
        let currentWarp = 1;
        function drawStars(t) {
            if(window.warpSpeed) currentWarp += (window.warpSpeed - currentWarp) * 0.1;
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            stars.forEach(s => {
                s.twinkle += 0.02;
                const o = s.o * (0.6 + 0.4 * Math.sin(s.twinkle));
                bgCtx.fillStyle = s.gold ? `rgba(212,168,81,${o})` : `rgba(255,255,255,${o})`;
                const stretch = currentWarp > 1 ? s.r * currentWarp * 1.5 : s.r;
                bgCtx.fillRect(s.x, s.y, s.r, stretch);
                s.y -= s.speed * currentWarp;
                if (s.y < 0) { s.y = bgCanvas.height; s.x = Math.random() * bgCanvas.width; }
            });
            requestAnimationFrame(drawStars);
        }
        requestAnimationFrame(drawStars);

        // Falling petals canvas
        const pCanvas = document.getElementById('petals-canvas');
        const pCtx = pCanvas.getContext('2d');
        let petals = [];
        function resizePetals() {
            pCanvas.width = window.innerWidth;
            pCanvas.height = window.innerHeight;
        }
        resizePetals();
        window.addEventListener('resize', resizePetals);

        function spawnPetal() {
            const isGold = Math.random() > 0.5;
            petals.push({
                x: Math.random() * pCanvas.width,
                y: -20,
                size: Math.random() * 8 + 4,
                speed: Math.random() * 1.5 + 0.5,
                drift: (Math.random() - 0.5) * 0.8,
                rot: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.08,
                o: Math.random() * 0.5 + 0.3,
                gold: isGold,
                hue: isGold ? Math.random() * 20 + 330 : Math.random() * 30 + 310
            });
        }
        setInterval(spawnPetal, 300);

        function drawPetals() {
            pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
            petals = petals.filter(p => p.y < pCanvas.height + 30);
            petals.forEach(p => {
                p.y += p.speed;
                p.x += p.drift;
                p.rot += p.rotSpeed;
                pCtx.save();
                pCtx.translate(p.x, p.y);
                pCtx.rotate(p.rot);
                pCtx.globalAlpha = p.o;
                // Draw petal shape
                pCtx.beginPath();
                pCtx.ellipse(0, 0, p.size, p.size * 1.8, 0, 0, Math.PI * 2);
                const color = p.gold
                    ? `hsla(${p.hue}, 70%, 65%, 1)`
                    : `hsla(${p.hue}, 70%, 80%, 1)`;
                pCtx.fillStyle = color;
                pCtx.fill();
                pCtx.restore();
            });
            requestAnimationFrame(drawPetals);
        }
        requestAnimationFrame(drawPetals);

        // Mouse parallax on portrait (Smooth Lerp)
        const portraitInner = document.querySelector('.portrait-inner');
        let targetX = 0, targetY = 0;
        let pX = 0, pY = 0;
        
        document.addEventListener('mousemove', e => {
            targetX = (e.clientX / window.innerWidth - 0.5) * 20;
            targetY = (e.clientY / window.innerHeight - 0.5) * 20;
        });
        
        document.addEventListener('mouseleave', () => { targetX = 0; targetY = 0; });
        
        function renderParallax() {
            if(portraitInner) {
                pX += (targetX - pX) * 0.1;
                pY += (targetY - pY) * 0.1;
                portraitInner.style.transform = `rotateX(${-pY * 0.4}deg) rotateY(${pX * 0.4}deg) scale(var(--p-scale, 1))`;
            }
            requestAnimationFrame(renderParallax);
        }
        renderParallax();

        // Page Reveal Transition
        window.addEventListener('load', () => {
            const overlay = document.getElementById('page-transition-overlay');
            if(overlay) {
                setTimeout(() => {
                    overlay.style.opacity = '0';
                    setTimeout(() => overlay.remove(), 1000);
                }, 50);
            }
        });

        // Outgoing Transition (God-Tier Cinematic Transition)
        const ctaBtn = document.querySelector('.cta-btn');
        if(ctaBtn) {
            ctaBtn.addEventListener('click', function(e) {
                e.preventDefault();
                const destination = this.href;
                
                // STAGE 1: Charging Up (Warp speed & Earthquake)
                window.warpSpeed = 70; // Insane star speed
                document.body.style.animation = 'cameraShake 0.1s infinite';
                
                // Spazz rings
                document.querySelectorAll('.ring').forEach(r => {
                    r.style.animationDuration = '0.3s';
                    r.style.borderColor = '#fff';
                    r.style.boxShadow = '0 0 50px #ec4899';
                });

                this.style.pointerEvents = 'none';
                this.innerHTML = '<span style="letter-spacing:0.3em;">IGNITING...</span>';
                this.style.transform = 'scale(0.9)';
                
                // STAGE 2: Implosion and Portal Burst
                setTimeout(() => {
                    document.body.style.animation = ''; // End shake
                    
                    const main = document.querySelector('main');
                    main.style.transition = 'transform 0.8s cubic-bezier(0.5, 0, 0.2, 1), opacity 0.6s, filter 0.6s';
                    main.style.transform = 'scale(4) rotate(15deg)'; // Wild dive
                    main.style.opacity = '0';
                    main.style.filter = 'blur(15px) brightness(200%)';

                    // Blinding light burst
                    const portal = document.createElement('div');
                    portal.style.position = 'fixed';
                    portal.style.top = '50%'; portal.style.left = '50%';
                    portal.style.width = '10px'; portal.style.height = '10px';
                    portal.style.marginTop = '-5px'; portal.style.marginLeft = '-5px';
                    portal.style.borderRadius = '50%';
                    portal.style.background = '#fff';
                    portal.style.boxShadow = '0 0 200px #fff, 0 0 400px #ec4899';
                    portal.style.zIndex = '99999';
                    portal.style.transform = 'scale(0)';
                    portal.style.transition = 'transform 0.7s cubic-bezier(0.7, 0, 0.1, 1), background 0.7s';
                    document.body.appendChild(portal);

                    requestAnimationFrame(() => {
                        portal.style.transform = 'scale(400)'; // Swallows screen
                        setTimeout(() => portal.style.background = '#1c0512', 400); // Fade to next page color
                    });

                    setTimeout(() => window.location.href = destination, 850);
                }, 600); // Charging duration
            });
        }
    </script>
</body>
</html>
