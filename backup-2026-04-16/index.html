<html lang="ar" dir="ltr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Mariam's World ✦</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌹</text></svg>">
    <meta name="theme-color" content="#2a0416">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Aref+Ruqaa:wght@400;700&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --gold: #ec4899; /* Pink-500 */
            --gold-light: #fdf2f8; /* Pink-50 */
            --gold-dim: rgba(236, 72, 153, 0.35);
            --crimson: #be185d; /* Pink-700 */
            --rose-deep: #831843; /* Pink-900 */
            --blush: rgba(255, 192, 203, 0.8);
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(236, 72, 153, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            font-family: 'Cormorant Garamond', serif;
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2a0416; /* Deep dark pink base */
            color: #fff;
        }

        /* Canvas Background */
        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* Aurora layers */
        .aurora {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }
        .aurora-layer {
            position: absolute;
            border-radius: 50%;
            /* filter and mix-blend-mode removed for mobile performance */
            animation: drift 15s ease-in-out infinite alternate;
            will-change: transform;
        }
        .aurora-1 {
            width: 70vw; height: 60vh;
            background: radial-gradient(ellipse, rgba(190, 24, 93, 0.4) 0%, transparent 70%);
            top: -10%; left: -10%;
            animation-duration: 18s;
        }
        .aurora-2 {
            width: 60vw; height: 70vh;
            background: radial-gradient(ellipse, rgba(236, 72, 153, 0.4) 0%, transparent 70%);
            bottom: -10%; right: -10%;
            animation-duration: 22s;
            animation-delay: -8s;
        }
        .aurora-3 {
            width: 50vw; height: 50vh;
            background: radial-gradient(ellipse, rgba(244, 114, 182, 0.3) 0%, transparent 70%);
            top: 30%; left: 30%;
            animation-duration: 14s;
            animation-delay: -4s;
        }
        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5vw, 5vh) scale(1.15); }
        }


        /* Main Content */
        main {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            margin: auto; /* Fix for flex centering overflow */
            gap: 0;
            opacity: 0;
            animation: pageReveal 2s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
        }
        @keyframes pageReveal {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Portrait */
        .portrait-wrap {
            --p-scale: 1;
            position: relative;
            width: calc(480px * var(--p-scale)); 
            height: calc(480px * var(--p-scale));
            margin: 0 auto 3rem auto;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            perspective: 1000px;
        }
        @media (max-width: 1024px) { .portrait-wrap { --p-scale: 0.85; margin-bottom: 2rem; } }
        @media (max-width: 768px) { .portrait-wrap { --p-scale: 0.7; margin-bottom: 1rem; } }
        @media (max-width: 480px) { .portrait-wrap { --p-scale: 0.5; margin-bottom: 0rem; } }
        @media (max-width: 380px) { .portrait-wrap { --p-scale: 0.42; margin-bottom: 0rem; } }
        @media (max-height: 800px) { .portrait-wrap { --p-scale: 0.75; margin-bottom: 1rem; } }
        @media (max-height: 650px) { .portrait-wrap { --p-scale: 0.5; margin-bottom: 0; } }
        /* Landscape Mobile */
        @media (max-height: 500px) and (orientation: landscape) { 
            .portrait-wrap { --p-scale: 0.35; margin-bottom: 0; } 
            h1 { font-size: 2rem !important; }
            .cta-btn { padding: 0.6rem 1.5rem; font-size: 1rem; margin-bottom: 2rem; }
        }
        
        .portrait-inner {
            position: absolute;
            width: 480px; height: 480px;
            display: flex; align-items: center; justify-content: center;
            transform: scale(var(--p-scale));
            border-radius: 50%;
        }

        /* Multiple spinning rings */
        .ring {
            position: absolute;
            top: 50%; left: 50%;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            opacity: 0;
            will-change: transform;
            animation: pageReveal 2s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
        }
        .ring-1 {
            width: 320px; height: 320px;
            border: 1px solid var(--gold-dim);
            animation: spinRing 30s linear infinite;
            box-shadow: 0 0 30px var(--gold-dim), inset 0 0 30px var(--gold-dim);
        }
        .ring-2 {
            width: 360px; height: 360px;
            border: 1px dashed rgba(212, 168, 81, 0.15);
            animation: spinRing 45s linear infinite reverse;
        }
        .ring-3 {
            width: 290px; height: 290px;
            border: 0.5px solid rgba(255, 200, 210, 0.2);
            animation: spinRing 20s linear infinite;
        }
        @keyframes spinRing {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Orbital gems on ring-1 */
        .gem {
            position: absolute;
            top: 50%; left: 50%;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--gold);
            box-shadow: 0 0 12px var(--gold), 0 0 24px rgba(212,168,81,0.6);
            transform-origin: 0 0;
            animation: orbitGem var(--orbit-dur, 30s) linear infinite var(--orbit-delay, 0s);
        }
        @keyframes orbitGem {
            from { transform: rotate(var(--start, 0deg)) translateX(159px) rotate(calc(-1 * var(--start, 0deg))); }
            to { transform: rotate(calc(var(--start, 0deg) + 360deg)) translateX(159px) rotate(calc(-1 * (var(--start, 0deg) + 360deg))); }
        }

        /* Portrait glow halo */
        .portrait-halo {
            position: absolute;
            top: 50%; left: 50%;
            width: 260px; height: 260px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212,168,81,0.15) 0%, transparent 70%);
            animation: haloPulse 4s ease-in-out infinite alternate;
            pointer-events: none;
        }
        @keyframes haloPulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
        }

        /* Epic Camera Shake */
        @keyframes cameraShake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-2px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .portrait-frame {
            position: relative;
            z-index: 5;
            width: 240px; height: 240px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--gold);
            box-shadow: 
                0 0 0 4px rgba(212,168,81,0.15),
                0 10px 40px rgba(0,0,0,0.5),
                inset 0 0 20px rgba(0,0,0,0.3);
        }
        .portrait-frame img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 2s ease;
        }
        .portrait-frame:hover img { transform: scale(1.05); }

        /* Portrait gems */
        .p-gem {
            position: absolute;
            z-index: 6;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(13, 0, 5, 0.7);
            border: 1px solid var(--gold);
            box-shadow: 0 0 20px rgba(212,168,81,0.4);
            backdrop-filter: blur(10px);
        }
        .p-gem-1 {
            width: 52px; height: 52px;
            bottom: 10px; right: -10px;
            animation: gemFloat 4s ease-in-out infinite;
        }
        .p-gem-2 {
            width: 40px; height: 40px;
            top: 5px; left: -15px;
            animation: gemFloat 5s ease-in-out infinite reverse;
        }
        @keyframes gemFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .p-gem .material-symbols-outlined {
            font-size: 22px;
            color: var(--gold-light);
            font-variation-settings: 'FILL' 1;
        }
        .p-gem-1 .material-symbols-outlined { font-size: 26px; }

        /* Headline */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 6vw, 5.5rem);
            font-weight: 400;
            font-style: italic;
            color: #fff;
            line-height: 1.15;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
            text-shadow: 0 0 60px rgba(212,168,81,0.3), 0 4px 30px rgba(0,0,0,0.5);
            position: relative;
        }
        h1 .name {
            display: block;
            background: linear-gradient(135deg, var(--gold-light), var(--gold), #c8985a, var(--gold-light));
